<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" role="img" aria-label="아스트라리스 5대 대륙 — 작가 그림 정본 v2">
<rect width="100%" height="100%" fill="#f1eadb"/>
<style>
.sea-h{fill:#dde5da}
.lbl{font-family:'Nanum Myeongjo',Batang,Georgia,serif;fill:#2e2517;font-weight:700}
.lbl2{font-family:'Pretendard','Malgun Gothic',sans-serif;fill:#75664c;font-weight:500}
.route{fill:none;stroke:#a97e1c;stroke-width:1.8;stroke-dasharray:7 5}
.route2{fill:none;stroke:#75664c;stroke-width:1.4;stroke-dasharray:2 4}
.city{fill:#c39b2d;stroke:#2e2517;stroke-width:1.1}
.cap{fill:#c39b2d;stroke:#2e2517;stroke-width:1.2}
.bord{fill:none;stroke:#75664c;stroke-width:1;stroke-dasharray:3 4;opacity:.75}
</style>
    <rect class="sea-h" width="1000" height="640"/>
    <g stroke="#bfcdc0" stroke-width=".6" opacity=".55">
      <path d="M0 80H1000M0 180H1000M0 280H1000M0 380H1000M0 480H1000M0 580H1000"/>
      <path d="M100 0V640M250 0V640M400 0V640M550 0V640M700 0V640M850 0V640"/>
    </g>

    <!-- 프로스트 (북) -->
    <path d="M318 52 L408 34 L506 40 L560 74 L548 118 L484 144 L396 152 L326 134 L300 94 Z"
      fill="#b8ccd8" stroke="#7e9aac" stroke-width="2"/>
    <path d="M360 96 l16 -20 16 20 M412 88 l16 -20 16 20 M462 100 l14 -18 14 18" fill="none" stroke="#7e9aac" stroke-width="1.5"/>
    <text class="lbl" x="428" y="126" font-size="20" text-anchor="middle">프로스트</text>

    <!-- 결빙해 (좁은 해협) -->
    <text class="lbl2" x="560" y="152" font-size="9.5">결빙해 — 연 300일 결빙 (쇄빙로)</text>

    <!-- 에테르 (중서 · 프로스트 바로 아래) -->
    <path d="M168 186 L292 158 L428 160 L516 182 L548 240 L522 304 L432 344 L296 352 L192 320 L148 252 Z"
      fill="#9dbd93" stroke="#4a7c4e" stroke-width="2.4"/>
    <text class="lbl" x="340" y="256" font-size="24" text-anchor="middle">에테르</text>
    <text class="lbl2" x="340" y="296" font-size="11" text-anchor="middle">생명의 숲 · Act 1 무대</text>
    <path d="M400 210 a28 14 0 1 0 .1 0" fill="none" stroke="#4a7c4e" stroke-width="1" opacity=".8"/>
    <text class="lbl2" x="452" y="200" font-size="9.5">은색 난기류</text>

    <!-- 산맥 경계 (에테르-크림슨) -->
    <path d="M232 360 l12 -14 12 14 M270 362 l12 -14 12 14 M308 362 l12 -14 12 14 M346 360 l12 -14 12 14 M384 356 l12 -14 12 14" fill="none" stroke="#75664c" stroke-width="1.3" opacity=".8"/>
    <text class="lbl2" x="446" y="366" font-size="9.5">경계 산맥 (지하 궤도망 관통)</text>

    <!-- 크림슨 (에테르 바로 남쪽 · 남으로 길게) -->
    <path d="M214 384 L326 368 L418 378 L452 428 L436 502 L388 566 L314 592 L248 566 L208 494 L200 428 Z"
      fill="#d3a184" stroke="#a5553c" stroke-width="2"/>
    <text class="lbl" x="322" y="474" font-size="22" text-anchor="middle">크림슨</text>
    <text class="lbl2" x="322" y="494" font-size="10.5" text-anchor="middle">붉은 황무지 · 솔라리안 제국</text>
    <text class="lbl2" x="322" y="512" font-size="9.5" text-anchor="middle">(수도 솔라리스 프라임)</text>

    <!-- 해양 (동측 군도 — 흩어진 섬들) -->
    <g fill="#a8c8c2" stroke="#3e7d8c" stroke-width="1.6">
      <ellipse cx="656" cy="252" rx="30" ry="15"/>
      <ellipse cx="722" cy="222" rx="22" ry="12"/>
      <ellipse cx="748" cy="286" rx="26" ry="13"/>
      <ellipse cx="678" cy="312" rx="18" ry="10"/>
      <ellipse cx="800" cy="250" rx="16" ry="9"/>
      <ellipse cx="726" cy="352" rx="20" ry="10"/>
      <ellipse cx="646" cy="376" rx="14" ry="8"/>
    </g>
    <text class="lbl" x="722" y="264" font-size="18" text-anchor="middle">해양 대륙</text>
    <text class="lbl2" x="722" y="398" font-size="10.5" text-anchor="middle">끝없는 바다 · 군도 — 5대륙 연결 허브 ✓</text>
    <text class="lbl2" x="790" y="330" font-size="10">검은 해협 ▸</text>

    <!-- 오벨리스크 (남동 원해) -->
    <g opacity=".92">
    <path d="M700 470 L778 450 L858 454 L912 484 L916 536 L874 578 L796 590 L730 570 L698 524 Z"
      fill="#8d8699" stroke="#5a5468" stroke-width="2" stroke-dasharray="8 4"/>
    <path d="M786 494 v30 M806 488 v36 M826 494 v30" stroke="#5a5468" stroke-width="2.4"/>
    <text class="lbl" x="806" y="552" font-size="18" text-anchor="middle" fill="#2e2517">오벨리스크</text>
    <text class="lbl2" x="806" y="570" font-size="10" text-anchor="middle">그림자의 대지 · 잊힌 외곽</text>
    </g>

    <!-- 노선 -->
    <path class="route" d="M470 152 C468 148 466 144 464 140 M470 152 C472 158 474 164 478 172"/>
    <path class="route2" d="M420 100 C400 160 380 220 360 300 C348 340 340 380 330 440" opacity=".9"/>
    <text class="lbl2" x="252" y="404" font-size="9.5" transform="rotate(78 252 404)"> </text>
    <text class="lbl2" x="152" y="352" font-size="10">철의 지하 궤도망 (프로스트-에테르-크림슨 지하 500m)</text>
    <path class="route" d="M540 270 C580 268 610 262 636 256"/>
    <text class="lbl2" x="548" y="252" font-size="10">태양빛 황금 해로</text>
    <path class="route2" d="M712 468 C640 480 540 500 462 500" opacity=".8"/>
    <text class="lbl2" x="510" y="524" font-size="10" opacity=".85">그림자 협곡 비도(밀수)</text>
    <path class="route2" d="M560 100 C700 140 800 300 820 448" opacity=".45"/>
    <text class="lbl2" x="700" y="150" font-size="9.5" opacity=".7" transform="rotate(24 700 150)">그림자 항구발 원해 밀수 항로</text>

    <!-- 부러진 나침반 -->
    <g transform="translate(78 560)" stroke="#a97e1c" fill="none" stroke-width="1.6">
      <circle r="30" opacity=".8"/><circle r="4" fill="#a97e1c" stroke="none"/>
      <path d="M0 -28 L6 -6 L0 0 L-6 -6 Z" fill="#a97e1c" stroke="none"/>
      <path d="M0 28 L6 6 L0 0 L-6 6 Z" opacity=".7"/>
      <path d="M-28 0 L-6 -6 L0 0 L-6 6 Z" opacity=".7"/>
      <path d="M28 0 L10 -4" opacity=".9"/><path d="M16 2 L24 7" opacity=".9"/>
      <text class="lbl2" y="-38" font-size="10" text-anchor="middle" stroke="none" fill="#75664c">N</text>
    </g>
  </svg>