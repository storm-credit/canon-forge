<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" role="img" aria-label="아스트라리스 5대 대륙 — 작가 스케치 정본">
<rect width="100%" height="100%" fill="#f1eadb"/>
<style>
.sea-h{fill:#dde5da}
.lbl{font-family:'Nanum Myeongjo',Batang,Georgia,serif;fill:#2e2517;font-weight:700}
.lbl2{font-family:'Pretendard','Malgun Gothic',sans-serif;fill:#75664c;font-weight:500}
.route{fill:none;stroke:#a97e1c;stroke-width:1.8;stroke-dasharray:7 5}
.route2{fill:none;stroke:#75664c;stroke-width:1.4;stroke-dasharray:2 4}
.city{fill:#c39b2d;stroke:#2e2517;stroke-width:1.1}
.cap{fill:#c39b2d;stroke:#2e2517;stroke-width:1.2}
.bord{fill:none;stroke:#75664c;stroke-width:1;stroke-dasharray:3 4;opacity:.75}
</style>
    <rect class="sea-h" width="1000" height="640"/>
    <g stroke="#bfcdc0" stroke-width=".6" opacity=".55">
      <path d="M0 80H1000M0 180H1000M0 280H1000M0 380H1000M0 480H1000M0 580H1000"/>
      <path d="M100 0V640M250 0V640M400 0V640M550 0V640M700 0V640M850 0V640"/>
    </g>

    <!-- 프로스트 (북서) -->
    <path d="M150 60 L215 40 L300 34 L385 46 L432 76 L420 116 L370 142 L295 154 L215 146 L162 118 Z"
      fill="#b8ccd8" stroke="#7e9aac" stroke-width="2"/>
    <path d="M225 90 l16 -20 16 20 M275 82 l16 -20 16 20 M327 94 l14 -18 14 18" fill="none" stroke="#7e9aac" stroke-width="1.5"/>
    <text class="lbl" x="290" y="126" font-size="21" text-anchor="middle">프로스트</text>
    <text class="lbl2" x="290" y="144" font-size="11" text-anchor="middle">얼음의 땅 · 90% 빙하</text>

    <!-- 에테르 (중서 · 최대) -->
    <path d="M92 232 L200 202 L330 196 L448 214 L488 262 L480 334 L436 396 L340 432 L220 426 L136 384 L84 310 Z"
      fill="#9dbd93" stroke="#4a7c4e" stroke-width="2.4"/>
    <text class="lbl" x="284" y="310" font-size="24" text-anchor="middle">에테르</text>
    <text class="lbl2" x="284" y="352" font-size="11.5" text-anchor="middle">생명의 숲 · Act 1 무대</text>
    <path d="M320 264 a30 16 0 1 0 .1 0" fill="none" stroke="#4a7c4e" stroke-width="1" opacity=".8"/>
    <text class="lbl2" x="376" y="252" font-size="10">은색 난기류(비행 불가)</text>

    <!-- 크림슨 (에테르 남동) -->
    <path d="M472 372 L570 348 L676 348 L764 372 L790 424 L762 478 L668 506 L556 502 L490 462 Z"
      fill="#d3a184" stroke="#a5553c" stroke-width="2"/>
    <text class="lbl" x="628" y="428" font-size="22" text-anchor="middle">크림슨</text>
    <text class="lbl2" x="628" y="448" font-size="11" text-anchor="middle">붉은 황무지 · 솔라리안 제국 (수도 솔라리스 프라임)</text>

    <!-- 오벨리스크 (최남동 원해) -->
    <g opacity=".92">
    <path d="M726 496 L804 474 L884 478 L936 508 L940 560 L896 600 L816 612 L748 592 L716 546 Z"
      fill="#8d8699" stroke="#5a5468" stroke-width="2" stroke-dasharray="8 4"/>
    <path d="M812 516 v32 M832 510 v38 M852 516 v32" stroke="#5a5468" stroke-width="2.4"/>
    <text class="lbl" x="830" y="576" font-size="19" text-anchor="middle" fill="#2e2517">오벨리스크</text>
    <text class="lbl2" x="828" y="594" font-size="10.5" text-anchor="middle">그림자의 대지 · 지도에 온전히 실리지 않는 외곽</text>
    </g>

    <!-- 해양 (동측 군도 허브) -->
    <g fill="#a8c8c2" stroke="#3e7d8c" stroke-width="1.6">
      <ellipse cx="664" cy="204" rx="34" ry="18"/>
      <ellipse cx="730" cy="172" rx="24" ry="13"/>
      <ellipse cx="752" cy="236" rx="28" ry="15"/>
      <ellipse cx="690" cy="260" rx="20" ry="11"/>
      <ellipse cx="806" cy="196" rx="18" ry="10"/>
    </g>
    <text class="lbl" x="726" y="212" font-size="19" text-anchor="middle">해양 대륙</text>
    <text class="lbl2" x="726" y="292" font-size="11" text-anchor="middle">끝없는 바다 · 군도 — 5대륙 연결 허브 ✓</text>
    <text class="lbl2" x="806" y="318" font-size="10.5">검은 해협 ▸</text>

    <!-- 항로·노선 -->
    <path class="route" d="M268 202 C272 186 276 172 282 156"/>
    <text class="lbl2" x="292" y="180" font-size="10.5">북부 얼음 분쇄로 (연 300일 결빙)</text>
    <path class="route" d="M470 300 C540 270 600 240 640 216"/>
    <text class="lbl2" x="502" y="266" font-size="10.5">태양빛 황금 해로</text>
    <path class="route2" d="M420 400 C450 420 480 432 508 442"/>
    <text class="lbl2" x="330" y="452" font-size="10.5">철의 지하 궤도망 (에테르-크림슨-프로스트 · 지하 500m)</text>
    <path class="route2" d="M240 202 C238 184 240 170 244 154"/>
    <path class="route2" d="M756 500 C728 486 700 478 676 472" opacity=".8"/>
    <text class="lbl2" x="672" y="530" font-size="10.5" opacity=".85">그림자 협곡 비도(밀수)</text>
    <path class="route2" d="M420 128 C560 180 700 340 760 480" opacity=".45"/>
    <text class="lbl2" x="556" y="206" font-size="9.5" opacity=".7" transform="rotate(38 556 206)">그림자 항구발 원해 밀수 항로</text>

    <!-- 부러진 나침반 로즈 -->
    <g transform="translate(78 560)" stroke="#a97e1c" fill="none" stroke-width="1.6">
      <circle r="30" opacity=".8"/><circle r="4" fill="#a97e1c" stroke="none"/>
      <path d="M0 -28 L6 -6 L0 0 L-6 -6 Z" fill="#a97e1c" stroke="none"/>
      <path d="M0 28 L6 6 L0 0 L-6 6 Z" opacity=".7"/>
      <path d="M-28 0 L-6 -6 L0 0 L-6 6 Z" opacity=".7"/>
      <path d="M28 0 L10 -4" opacity=".9"/><path d="M16 2 L24 7" opacity=".9"/>
      <text class="lbl2" y="-38" font-size="10" text-anchor="middle" stroke="none" fill="#75664c">N</text>
    </g>
  </svg>