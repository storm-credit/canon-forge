    <text class="lbl2" x="700" y="678" font-size="10">태양빛 황금 해로 →</text>

    <path d="M420 552 C460 544 510 550 548 544" fill="none" stroke="#5a5468" stroke-width="2.4" stroke-dasharray="2 5"/>
    <text class="lbl2" x="436" y="568" font-size="9.5">≋ 지하 대균열 (지하 — 투영 표기)</text>

    <!-- 범례 -->
    <g transform="translate(660 60)">
      <rect x="-12" y="-16" width="278" height="120" fill="#f7f2e6" stroke="#d3c7a9" rx="3"/>
