    <rect x="252" y="352" width="7" height="7" fill="#7a4a8f" stroke="#2e2517" stroke-width=".8"/><text class="lbl2" x="196" y="364" font-size="9">크라운워치</text>
    <path d="M212 246 l12 -16 12 16 -12 10 Z" fill="none" stroke="#7a4a8f" stroke-width="1.6"/><circle class="city" cx="224" cy="248" r="4"/>
