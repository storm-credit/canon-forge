.route{fill:none;stroke:#a97e1c;stroke-width:1.8;stroke-dasharray:7 5}
.route2{fill:none;stroke:#75664c;stroke-width:1.4;stroke-dasharray:2 4}
.city{fill:#c39b2d;stroke:#2e2517;stroke-width:1.1}
.cap{fill:#c39b2d;stroke:#2e2517;stroke-width:1.2}
.bord{fill:none;stroke:#75664c;stroke-width:1;stroke-dasharray:3 4;opacity:.75}
</style>
    <rect class="sea-h" width="940" height="760"/>
    <path d="M170 118 L330 74 L520 62 L700 92 L800 172 L836 300 L812 452 L740 572 L600 660 L430 690 L280 650 L172 550 L118 400 L124 240 Z"
