    <text class="lbl" x="182" y="500" font-size="12">카르델라</text><text class="lbl2" x="164" y="513" font-size="9.5">서부 협곡 · 카지노</text>
    <circle class="city" cx="386" cy="442" r="5"/><text class="lbl" x="396" y="440" font-size="12">포지게이트</text>
