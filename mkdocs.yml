site_name: THE FORGOTTEN SUMMONER — 캐논
site_description: 정리된 세계관 캐논 (consolidated canon)
site_url: https://storm-credit.github.io/canon-forge/
docs_dir: docs/canon

theme:
  name: material
  language: ko
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - 홈: index.md
  - 세계의 헌법: 0-헌법/세계의-헌법.md
  - 아스트라리스 크로니클:
      - 크로니클 로드맵: 0-헌법/크로니클-로드맵.md
      - 창세신화: 0-헌법/창세신화.md
      - 신앙체계: 0-헌법/신앙체계.md
      - 연대기: 0-헌법/연대기.md
      - 고대문명: 0-헌법/고대문명.md
      - 시스템:
          - 직업체계: 1-시스템/직업체계.md
          - 마법체계: 1-시스템/마법체계.md
          - 소환체계: 1-시스템/소환체계.md
          - 신성체계: 1-시스템/신성체계.md
          - 마공체계: 1-시스템/마공체계.md
          - 연금체계: 1-시스템/연금체계.md
          - 정령체계: 1-시스템/정령체계.md
          - 주술체계: 1-시스템/주술체계.md
          - 등급 체계 정합표: 1-시스템/등급-대가-정합표.md
      - 무대:
          - 에테르 대륙: 2-무대/에테르대륙.md
          - 크림슨 대륙: 2-무대/크림슨대륙.md
          - 프로스트 대륙: 2-무대/프로스트대륙.md
          - 오벨리스크 대륙: 2-무대/오벨리스크대륙.md
          - 해양 대륙: 2-무대/해양대륙.md
          - 교통·통신 체계: 2-무대/교통-통신.md
          - 전쟁사 연대기: 2-무대/10대전쟁사.md
      - 사물:
          - 아이템 도감: 3-사물/아이템-도감.md
          - 탐험·여행 장비: 3-사물/탐험-장비/탐험-장비-도감.md
          - "세트: 사자왕의 완전군장": 3-사물/세트-장비/사자왕의-완전군장.md
          - "세트: 탐험가의 바람 장비": 3-사물/세트-장비/탐험가의-바람-장비-세트.md
          - 동반수 백과: 3-사물/동반수-백과.md
          - 몬스터 백과: 3-사물/몬스터-백과.md
      - 인물:
          - 에반: 에반.md
          - 루미에: 4-인물/루미에.md
          - 영웅 인덱스: 4-인물/영웅-인덱스.md
          - 9대 페르소나:
              - 인덱스: 4-인물/페르소나/_인덱스.md
              - 01 레온하르트 카스테로: 4-인물/페르소나/01-레온하르트-카스테로.md
              - 02 카일락 무라드: 4-인물/페르소나/02-카일락-무라드.md
              - 03 세드릭 아인하르트: 4-인물/페르소나/03-세드릭-아인하르트.md
              - 04 빈센트 그라시움: 4-인물/페르소나/04-빈센트-그라시움.md
              - 05 루시우스 베네딕트: 4-인물/페르소나/05-루시우스-베네딕트.md
              - 06 렉시온 아머하트: 4-인물/페르소나/06-렉시온-아머하트.md
              - 07 에리히 폰 발디크: 4-인물/페르소나/07-에리히-폰-발디크.md
              - 08 단테스 코르바흐: 4-인물/페르소나/08-단테스-코르바흐.md
              - 09 파우스트 폰 아르젠틱: 4-인물/페르소나/09-파우스트-폰-아르젠틱.md
  - 정리 관리:
      - "현황 (정본)": _progress.md
      - "수행 대시보드": _작업지시서.md
      - "기준·프롬프트 마스터": _작업프롬프트.md
      - "원본 카테고리 배정 지도": _PLAN.md
      - 충돌·미해결: _collisions.md
      - 원본 전수 분석: _전수분석.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang: ko
  - roamlinks   # [[위키링크]] 를 클릭 가능한 링크로 변환
