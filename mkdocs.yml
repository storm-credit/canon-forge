site_name: THE FORGOTTEN SUMMONER — 캐논
site_description: 정리된 세계관 캐논 (consolidated canon)
site_url: https://storm-credit.github.io/canon-forge/
docs_dir: docs/canon

theme:
  name: material
  language: ko
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - 홈: index.md
  - 세계의 헌법 (世界의 틀):
      - 세계의 헌법: 0-헌법/세계의-헌법.md
  - 아스트라리스 크로니클:
      - 창세 & 신앙 (헌법 lore):
          - 창세신화: 0-헌법/창세신화.md
          - 신앙체계: 0-헌법/신앙체계.md
          - 연대기: 0-헌법/연대기.md
          - 고대문명: 0-헌법/고대문명.md
      - 시스템:
          - 직업체계: 1-시스템/직업체계.md
          - 마법체계: 1-시스템/마법체계.md
          - 소환체계: 1-시스템/소환체계.md
          - 신성체계: 1-시스템/신성체계.md
          - 마공체계: 1-시스템/마공체계.md
          - 연금체계: 1-시스템/연금체계.md
          - 정령체계: 1-시스템/정령체계.md
          - 주술체계: 1-시스템/주술체계.md
          - 등급 체계 정합표: 1-시스템/등급-대가-정합표.md
      - 사물:
          - 아이템 도감: 3-사물/아이템-도감.md
          - 탐험·여행 장비: 3-사물/탐험-장비/탐험-장비-도감.md
          - "세트: 사자왕의 완전군장": 3-사물/세트-장비/사자왕의-완전군장.md
          - "세트: 탐험가의 바람 장비": 3-사물/세트-장비/탐험가의-바람-장비-세트.md
      - 인물:
          - 에반: 에반.md
  - 정리 관리:
      - 진행 현황: _progress.md
      - 작업지시서: _작업지시서.md
      - 작업 프롬프트: _작업프롬프트.md
      - 충돌·미해결: _collisions.md
      - 원본 전수 분석: _전수분석.md
      - 마스터 플랜: _PLAN.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang: ko
  - roamlinks   # [[위키링크]] 를 클릭 가능한 링크로 변환
