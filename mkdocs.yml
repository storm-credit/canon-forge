site_name: THE FORGOTTEN SUMMONER — 캐논
site_description: 정리된 세계관 캐논 (consolidated canon)
site_url: https://storm-credit.github.io/canon-forge/
docs_dir: docs/canon

theme:
  name: material
  language: ko
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - 홈: index.md
  - 0. 헌법:
      - 세계의 헌법: 0-헌법/세계의-헌법.md
      - 창세신화: 0-헌법/창세신화.md
      - 신앙체계: 0-헌법/신앙체계.md
      - 연대기: 0-헌법/연대기.md
      - 고대문명: 0-헌법/고대문명.md
  - 3. 사물:
      - 아이템 도감: 3-사물/아이템-도감.md
      - 탐험·여행 장비: 3-사물/탐험-장비/탐험-장비-도감.md
      - "세트: 사자왕의 완전군장": 3-사물/세트-장비/사자왕의-완전군장.md
      - "세트: 탐험가의 바람 장비": 3-사물/세트-장비/탐험가의-바람-장비-세트.md
  - 4. 인물:
      - 에반: 에반.md
  - 정리 관리:
      - 마스터 플랜: _PLAN.md
      - 작업지시서: _작업지시서.md
      - 진행 현황: _progress.md
      - 충돌·미해결: _collisions.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang: ko
  - roamlinks   # [[위키링크]] 를 클릭 가능한 링크로 변환
